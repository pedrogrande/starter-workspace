services:
  starter-db:
    image: agnohq/pgvector:18
    container_name: starter-db
    restart: unless-stopped
    profiles:
      - postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    networks:
      - starter

  starter-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starter-api
    image: ${IMAGE_NAME:-starter}:${IMAGE_TAG:-latest}
    # --reload-dir limits the watcher to dirs that actually contain runtime
    # code. Without this, edits under docs/, scripts/, tmp/ would each
    # restart uvicorn — disruptive when chatting with an agent.
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir agents --reload-dir app --reload-dir db
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - path: .env
        required: false
    environment:
      RUNTIME_ENV: dev
      AGNO_DEBUG: "True"
      WAIT_FOR_DB: "True"
      DB_BACKEND: ${DB_BACKEND:-sqlite}
      starter_URL: http://127.0.0.1:8000
      DB_HOST: starter-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
    networks:
      - starter
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  starter:

volumes:
  pgdata:
